name: CI/CD Tienda Perritos - Backend

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"

jobs:
  build-push-deploy-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login en Amazon ECR (runner)
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build imagen Backend y push a ECR
      run: |
        cd backend
        docker build -t tienda-backend .
        docker tag tienda-backend:latest ${{ secrets.ECR_REPO_URL_BACKEND }}:latest
        docker push ${{ secrets.ECR_REPO_URL_BACKEND }}:latest

    - name: Desplegar Backend vía SSM (Contenedor Individual)
      run: |
        # Extraemos la URL base del registro desde la URL del repositorio del Backend
        ECR_REGISTRY=$(echo "${{ secrets.ECR_REPO_URL_BACKEND }}" | cut -d'/' -f1)

        COMMAND_ID=$(aws ssm send-command \
          --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --comment "Desplegar contenedor tienda-backend sin Docker Compose" \
          --parameters "{\"commands\":[
            \"set -x\",
            \"aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin $ECR_REGISTRY\",
            \"docker pull ${{ secrets.ECR_REPO_URL_BACKEND }}:latest\",
            \"docker stop tienda-backend || true\",
            \"docker rm tienda-backend || true\",
            \"docker run -d --name tienda-backend -p 3001:3001 ${{ secrets.ECR_REPO_URL_BACKEND }}:latest\"
          ]}" \
          --query "Command.CommandId" \
          --output text)
        
        echo "Comando SSM de Backend enviado con ID: $COMMAND_ID"
        echo "Esperando confirmación real de la EC2 del Backend..."
        
        aws ssm wait command-executed \
          --command-id "$COMMAND_ID" \
          --instance-id ${{ secrets.EC2_BACKEND_INSTANCE_ID }}
