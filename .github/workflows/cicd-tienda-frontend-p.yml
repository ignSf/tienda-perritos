name: CI/CD Tienda Perritos - Frontend

on:
  push:
    branches: [ "main" ]

jobs:
  build-push-deploy-frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login en Amazon ECR (runner)
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build imagen Frontend y push a ECR
      run: |
        cd frontend
        docker build -t tienda-frontend .
        docker tag tienda-frontend:latest ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest
        docker push ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest

    - name: Desplegar Frontend vía SSM (Contenedor Individual)
      run: |
        # Extraemos la URL base del registro directamente desde la URL del repositorio
        ECR_REGISTRY=$(echo "${{ secrets.ECR_REPO_URL_FRONTEND }}" | cut -d'/' -f1)

        COMMAND_ID=$(aws ssm send-command \
          --instance-ids ${{ secrets.EC2_FRONTEND_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --comment "Desplegar contenedor tienda-frontend sin Docker Compose" \
          --parameters "{\"commands\":[
            \"set -x\",
            \"aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin $ECR_REGISTRY\",
            \"docker pull ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest\",
            \"docker stop tienda-frontend || true\",
            \"docker rm tienda-frontend || true\",
            \"docker run -d --name tienda-frontend -p 80:80 ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest\"
          ]}" \
          --query "Command.CommandId" \
          --output text)
        
        echo "Comando SSM enviado con ID: $COMMAND_ID"
        echo "Esperando confirmación real de la EC2..."
        
        # Esto obliga al workflow a esperar y fallar en GitHub si la EC2 no logra levantar el contenedor
        aws ssm wait command-executed \
          --command-id "$COMMAND_ID" \
          --instance-id ${{ secrets.EC2_FRONTEND_INSTANCE_ID }}
